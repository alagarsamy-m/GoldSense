name: Weekly Data Update & Model Retraining

on:
  # Run every Monday at 6:00 AM UTC (11:30 AM IST)
  schedule:
    - cron: '0 6 * * 1'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write   # Required to commit updated dataset back to repo

jobs:
  update-data-and-retrain:
    name: Update Dataset, Retrain Model & Deploy to Render
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. Setup Python ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install ML dependencies ───────────────────────────────────────
      - name: Install ML dependencies
        run: |
          pip install --upgrade pip
          pip install -r ml/requirements.txt

      # ── 4. Update dataset via yfinance ───────────────────────────────────
      - name: Fetch latest gold prices (yfinance)
        run: |
          cd ml
          python update_data.py

      # ── 5. Evaluate last prediction accuracy ─────────────────────────────
      - name: Log prediction accuracy
        run: |
          cd ml
          python evaluate.py
        continue-on-error: true   # Don't fail pipeline if evaluation fails

      # ── 6. Retrain XGBoost model ─────────────────────────────────────────
      - name: Retrain XGBoost model
        run: |
          cd ml
          python train.py

      # ── 7. Commit updated dataset + model to repository ──────────────────
      - name: Commit updated data and model
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dataset/Gold\ Rate.csv dataset/USD-INR.csv dataset/prediction_logs.csv ml/model/gold_model.pkl ml/model/model_metadata.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "data: weekly update $(date -u '+%Y-%m-%d') [skip ci]"
          git push
        continue-on-error: true   # Don't fail if no new data

      # ── 8. Upload model artifact (for debugging) ──────────────────────────
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-${{ github.run_number }}
          path: |
            ml/model/gold_model.pkl
            ml/model/model_metadata.json
          retention-days: 30

      # ── 9. Trigger Render redeploy ────────────────────────────────────────
      - name: Trigger Render deployment
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Render deployment triggered successfully"
