name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'ml/**'
      - '.github/workflows/deploy-backend.yml'
  # Allow manual trigger
  workflow_dispatch:

env:
  GCP_REGION: asia-south1
  IMAGE_NAME: goldsense-backend
  ARTIFACT_REGISTRY: asia-south1-docker.pkg.dev

jobs:
  deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/goldsense/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/goldsense/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -f backend/Dockerfile \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/goldsense/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.IMAGE_NAME }} \
            --image=${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/goldsense/${{ env.IMAGE_NAME }}:latest \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --allow-unauthenticated \
            --set-env-vars="SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" \
            --quiet

      - name: Print deployment URL
        run: |
          URL=$(gcloud run services describe ${{ env.IMAGE_NAME }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --format="value(status.url)")
          echo "Backend deployed: $URL"
